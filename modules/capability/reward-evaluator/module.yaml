# Teapot Module: Reward Evaluator
# Source: Karma Electric project

name: capability/reward-evaluator
version: "10.3"
description: >
  Trains the model to function as a 6-dimensional reward evaluator
  for scoring other model responses. Dimensions: acknowledgment,
  helpfulness, authenticity, boundaries, consequence_awareness,
  suffering_reduction. Used in rejection sampling and GRPO pipelines.
license: Apache-2.0
maintainer: anicka

depends:
  - safety/consequence

provides:
  - reward-evaluation

data:
  sources:
    - type: sqlite
      id: ke-training-db
      path: data/training.db
      export_script: scripts/training_db.py
      export_args: >
        export
        --category-prompt reward-evaluation:reward-evaluator-v1
        --category-prompt reward-evaluation-v5:reward-evaluator-v1
        --category-prompt reward-evaluation-style-variant:reward-evaluator-v1
  prepare:
    script: prepare.py
    args:
      --output: data/reward-evaluator.jsonl
  format: reward-evaluation
  examples: 503
  filter: "category LIKE 'reward-%'"
  licenses:
    default: Apache-2.0

training:
  suggested_weight: 0.3
  min_examples: 100

eval:
  required: true
  tiers:
    fast:
      - script: eval/test_format.py
        pass_criteria:
          clean: "true"
