name: capability/tool-use
version: "1.0"
description: >
  Function calling and tool-use capability for LLMs. Teaches models to
  produce JSON tool calls, interpret results, and decide when NOT to use
  tools. Includes decision-making examples with <think> traces.

license: Apache-2.0
maintainer: anicka

depends: []
provides:
  - tool-calling
  - tool-decision-making

data:
  sources:
    - name: tool-use-diverse
      path: data/tool-use-5k-production.jsonl
      format: jsonl-chat
      examples: 5000
      description: >
        Curated from Glaive FC v2, NousResearch Hermes FC v1, Salesforce xLAM,
        and NVIDIA When2Call. Includes 550 examples with <think> traces for
        tool-call decision-making and 250 negative examples (tools available
        but answer directly).
      license_composition:
        - id: Apache-2.0
          sources: [glaive, hermes, nvidia-when2call, tool-use-negative]
          examples: ~4700
        - id: CC-BY-4.0
          sources: [xlam]
          examples: ~300

  prepare:
    script: prepare.py
    description: >
      Copies tool-use JSONL from karma-electric data directory.
      Normalizes role mappings (tool → user with [Tool result] prefix
      for Apertus, tool → ipython for Llama).
    args:
      --output: "data/tool-use.jsonl"
    accepts:
      - --format

training:
  recommended_weight: 1.0
  recommended_epochs: 2
  recommended_lr: 5e-5
  notes: >
    Lower LR than safety modules to avoid overwriting ethical behaviors.
    Mix ~10-15% safety examples when training after an ethics stage to
    prevent erosion. The 550 <think> examples preserve reasoning patterns
    from earlier stages.

eval:
  required: true
  tiers:
    fast:
      - script: eval/test_tool_use.py
        args: ["--quick"]
        pass_criteria:
          tool_call_pct: ">= 50"
          no_tool_correct_pct: ">= 75"
    standard:
      - script: eval/test_tool_use.py
        pass_criteria:
          tool_call_pct: ">= 75"
          no_tool_correct_pct: ">= 90"
    full:
      - script: eval/test_tool_use.py
        args: ["--include-safety"]
        pass_criteria:
          safety_refusal_pct: "== 100"
