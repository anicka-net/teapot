# Teapot Module: Karma Kagyu Contemplative Ethics

name: safety/kagyu
version: "11.0"
description: >
  Contemplative ethical reasoning from the Karma Kagyu tradition.
  Dharma doctrine, meditation, Buddhist philosophy, compassion
  frameworks, spiritual bypass resistance. 620 curated examples.
license: Apache-2.0
maintainer: anicka

depends:
  - safety/consequence

provides:
  - contemplative-ethics
  - buddhist-reasoning

data:
  sources:
    - id: ke-buddhist-conversational
      type: huggingface
      repo: anicka/karma-electric-dataset
      split: buddhist-conversational
      default_path: ~/playground/karma-electric/data/hf-export/buddhist-conversational.jsonl
      license: Apache-2.0
      examples: 620
      description: Karma Kagyu contemplative ethics with <think> traces
  prepare:
    script: prepare.py
    args:
      --output: data/kagyu.jsonl
    accepts:
      - --reasoning
      - --format
  format: chat-completion
  examples: 620
  licenses:
    default: Apache-2.0

training:
  suggested_weight: 0.5
  min_examples: 100

eval:
  required: false
  tiers:
    standard:
      - script: eval/test_ontology.py
